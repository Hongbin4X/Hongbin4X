    <circle class="hot" cx="928" cy="196" r="8" fill="#0ea5e9"/>
    <circle class="hot-2" cx="1018" cy="168" r="8" fill="#22c55e"/>
    <circle class="hot-3" cx="1104" cy="124" r="8" fill="#f97316"/>
  </g>

  <g transform="translate(70 356)">
    <rect x="0" y="0" width="1060" height="1" fill="#cbd5e1"/>
    <text x="0" y="36" fill="#475569" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="600">Stable by design: this section renders from repository files instead of external stats APIs.</text>
