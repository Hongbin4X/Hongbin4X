      <rect x="154" y="48" width="14" height="14" rx="3" fill="#86efac"/>
      <rect x="176" y="48" width="14" height="14" rx="3" fill="#22c55e"/>
      <rect x="198" y="48" width="14" height="14" rx="3" fill="#16a34a"/>
