<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hongbin4X local activity cards</title>
  <desc id="desc">Static profile activity cards showing work rhythm, stack mix, and a decorative contribution-style grid.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1200" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="ink" x1="60" y1="54" x2="1130" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="430" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="0.42" stop-color="#22c55e"/>
      <stop offset="0.72" stop-color="#f97316"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity=".12"/>
    </filter>
    <style>
      @keyframes dash {
        from { stroke-dashoffset: 190; }
        to { stroke-dashoffset: 0; }
      }
      @keyframes glow {
        0%, 100% { opacity: .42; }
        50% { opacity: 1; }
      }
      .path { stroke-dasharray: 190; animation: dash 5.5s ease-in-out infinite alternate; }
      .hot { animation: glow 3.4s ease-in-out infinite; }
      .hot-2 { animation: glow 4.2s ease-in-out infinite .6s; }
      .hot-3 { animation: glow 3.8s ease-in-out infinite 1.1s; }
      @media (prefers-reduced-motion: reduce) {
        .path, .hot, .hot-2, .hot-3 { animation: none; }
      }
    </style>
  </defs>

  <rect width="1200" height="430" rx="24" fill="url(#panel)"/>
  <path d="M0 330 C160 292 286 374 446 328 C605 282 704 315 842 285 C1005 250 1088 272 1200 236 V430 H0 V330Z" fill="#38bdf8" fill-opacity=".08"/>
  <path d="M70 68 H1130" stroke="#cbd5e1" stroke-width="1"/>
  <text x="70" y="44" fill="#0f172a" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="800">Activity Signal</text>
  <text x="970" y="44" fill="#64748b" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="600">local SVG · no API downtime</text>

  <g filter="url(#shadow)">
    <rect x="70" y="92" width="330" height="230" rx="16" fill="#ffffff"/>
    <rect x="435" y="92" width="330" height="230" rx="16" fill="#ffffff"/>
    <rect x="800" y="92" width="330" height="230" rx="16" fill="#ffffff"/>
  </g>

  <g>
    <text x="100" y="135" fill="#0f172a" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="21" font-weight="800">Builder Profile</text>
    <text x="100" y="164" fill="#64748b" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="600">steady experiments, practical output</text>
    <rect x="100" y="194" width="270" height="13" rx="6.5" fill="#e2e8f0"/>
    <rect x="100" y="194" width="212" height="13" rx="6.5" fill="url(#bar)"/>
    <text x="100" y="244" fill="#0f172a" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="800">Code</text>
    <text x="198" y="244" fill="#64748b" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700">+</text>
    <text x="225" y="244" fill="#0f172a" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="800">Taste</text>
    <text x="100" y="282" fill="#475569" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15">Readable systems, useful tools, calm iteration.</text>
  </g>

  <g>
    <text x="465" y="135" fill="#0f172a" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="21" font-weight="800">Stack Mix</text>
    <text x="465" y="164" fill="#64748b" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="600">languages and tools I reach for</text>
    <circle cx="497" cy="219" r="11" fill="#3776AB"/>
    <text x="520" y="224" fill="#334155" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="700">Python</text>
    <rect x="610" y="209" width="110" height="12" rx="6" fill="#dbeafe"/>
    <rect x="610" y="209" width="86" height="12" rx="6" fill="#3776AB"/>
    <circle cx="497" cy="257" r="11" fill="#3178C6"/>
    <text x="520" y="262" fill="#334155" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="700">TypeScript</text>
    <rect x="610" y="247" width="110" height="12" rx="6" fill="#dbeafe"/>
    <rect x="610" y="247" width="76" height="12" rx="6" fill="#3178C6"/>
    <circle cx="497" cy="295" r="11" fill="#f97316"/>
    <text x="520" y="300" fill="#334155" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="700">Product UI</text>
    <rect x="610" y="285" width="110" height="12" rx="6" fill="#ffedd5"/>
    <rect x="610" y="285" width="69" height="12" rx="6" fill="#f97316"/>
  </g>

  <g>
    <text x="830" y="135" fill="#0f172a" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="21" font-weight="800">Contribution Rhythm</text>
    <text x="830" y="164" fill="#64748b" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="600">decorative local grid, always available</text>
    <path class="path" d="M838 272 C875 212 900 234 928 196 C958 154 995 192 1018 168 C1047 138 1082 158 1104 124" stroke="#0ea5e9" stroke-width="4" stroke-linecap="round" fill="none"/>
    <g transform="translate(836 194)">
      <rect x="0" y="0" width="14" height="14" rx="3" fill="#dbeafe"/>
      <rect x="22" y="0" width="14" height="14" rx="3" fill="#bae6fd"/>
      <rect x="44" y="0" width="14" height="14" rx="3" fill="#7dd3fc"/>
      <rect x="66" y="0" width="14" height="14" rx="3" fill="#38bdf8"/>
      <rect x="88" y="0" width="14" height="14" rx="3" fill="#0ea5e9"/>
      <rect x="110" y="0" width="14" height="14" rx="3" fill="#dbeafe"/>
      <rect x="132" y="0" width="14" height="14" rx="3" fill="#bae6fd"/>
      <rect x="154" y="0" width="14" height="14" rx="3" fill="#38bdf8"/>
      <rect x="176" y="0" width="14" height="14" rx="3" fill="#0ea5e9"/>
      <rect x="198" y="0" width="14" height="14" rx="3" fill="#0369a1"/>
      <rect x="0" y="24" width="14" height="14" rx="3" fill="#dcfce7"/>
      <rect x="22" y="24" width="14" height="14" rx="3" fill="#bbf7d0"/>
      <rect x="44" y="24" width="14" height="14" rx="3" fill="#86efac"/>
      <rect x="66" y="24" width="14" height="14" rx="3" fill="#22c55e"/>
      <rect x="88" y="24" width="14" height="14" rx="3" fill="#dbeafe"/>
      <rect x="110" y="24" width="14" height="14" rx="3" fill="#bae6fd"/>
      <rect x="132" y="24" width="14" height="14" rx="3" fill="#7dd3fc"/>
      <rect x="154" y="24" width="14" height="14" rx="3" fill="#38bdf8"/>
      <rect x="176" y="24" width="14" height="14" rx="3" fill="#bbf7d0"/>
      <rect x="198" y="24" width="14" height="14" rx="3" fill="#22c55e"/>
      <rect x="0" y="48" width="14" height="14" rx="3" fill="#e0f2fe"/>
      <rect x="22" y="48" width="14" height="14" rx="3" fill="#dbeafe"/>
      <rect x="44" y="48" width="14" height="14" rx="3" fill="#bae6fd"/>
      <rect x="66" y="48" width="14" height="14" rx="3" fill="#7dd3fc"/>
      <rect x="88" y="48" width="14" height="14" rx="3" fill="#38bdf8"/>
