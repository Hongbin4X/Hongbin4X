<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hongbin4X profile header</title>
  <desc id="desc">Animated GitHub profile header with grid, moving signal lines, and the Hongbin4X name.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.46" stop-color="#111827"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="name" x1="168" y1="120" x2="630" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.48" stop-color="#a7f3d0"/>
      <stop offset="1" stop-color="#facc15"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="220" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" stroke="#e5e7eb" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes slideRight {
        from { transform: translateX(-260px); opacity: .2; }
        45% { opacity: 1; }
        to { transform: translateX(1240px); opacity: .2; }
      }
      @keyframes slideLeft {
        from { transform: translateX(1240px); opacity: .2; }
        45% { opacity: 1; }
        to { transform: translateX(-260px); opacity: .2; }
      }
      @keyframes pulse {
        0%, 100% { opacity: .28; transform: scale(1); }
        50% { opacity: .9; transform: scale(1.08); }
      }
      @keyframes floatText {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }
      .signal-a { animation: slideRight 7s linear infinite; }
      .signal-b { animation: slideLeft 9s linear infinite; }
      .signal-c { animation: slideRight 11s linear infinite; }
      .node-1 { transform-origin: 890px 90px; animation: pulse 3.6s ease-in-out infinite; }
      .node-2 { transform-origin: 1010px 176px; animation: pulse 4.4s ease-in-out infinite .5s; }
      .node-3 { transform-origin: 805px 256px; animation: pulse 3.9s ease-in-out infinite 1s; }
      .headline { animation: floatText 5.5s ease-in-out infinite; }
      @media (prefers-reduced-motion: reduce) {
        .signal-a, .signal-b, .signal-c, .node-1, .node-2, .node-3, .headline { animation: none; }
      }
    </style>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)"/>
  <path d="M0 292 C160 248 274 340 424 292 C589 240 680 293 828 250 C977 207 1078 242 1200 203 V360 H0 V292Z" fill="#0ea5e9" fill-opacity="0.08"/>
  <path d="M0 318 C180 280 320 322 460 300 C640 271 702 336 875 291 C1018 254 1103 285 1200 250 V360 H0 V318Z" fill="#22c55e" fill-opacity="0.08"/>

  <g filter="url(#softGlow)">
    <path class="signal-a" d="M0 78 H220" stroke="url(#line)" stroke-width="3" stroke-linecap="round"/>
    <path class="signal-b" d="M0 182 H260" stroke="url(#line)" stroke-width="3" stroke-linecap="round"/>
    <path class="signal-c" d="M0 282 H180" stroke="url(#line)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g class="headline">
    <text x="80" y="132" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="26" font-weight="700" letter-spacing="0">Hi, I am</text>
    <text x="78" y="205" fill="url(#name)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="78" font-weight="800" letter-spacing="0">Hongbin4X</text>
    <text x="82" y="252" fill="#e5e7eb" fill-opacity="0.86" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="500" letter-spacing="0">I build, learn, refactor, and ship.</text>
  </g>

  <g opacity=".9">
    <path d="M795 92 H928 L1012 176 H1100" stroke="#94a3b8" stroke-opacity=".34" stroke-width="2"/>
    <path d="M795 256 H910 L1012 176" stroke="#94a3b8" stroke-opacity=".34" stroke-width="2"/>
    <path d="M890 90 L805 256" stroke="#94a3b8" stroke-opacity=".22" stroke-width="2"/>
    <circle class="node-1" cx="890" cy="90" r="12" fill="#38bdf8"/>
    <circle class="node-1" cx="890" cy="90" r="22" stroke="#38bdf8" stroke-opacity=".28" stroke-width="2"/>
    <circle class="node-2" cx="1012" cy="176" r="15" fill="#22c55e"/>
    <circle class="node-2" cx="1012" cy="176" r="28" stroke="#22c55e" stroke-opacity=".24" stroke-width="2"/>
    <circle class="node-3" cx="805" cy="256" r="11" fill="#f97316"/>
    <circle class="node-3" cx="805" cy="256" r="21" stroke="#f97316" stroke-opacity=".24" stroke-width="2"/>
  </g>

  <g transform="translate(870 248)">
    <rect x="0" y="0" width="250" height="54" rx="14" fill="#020617" fill-opacity=".42" stroke="#e5e7eb" stroke-opacity=".12"/>
    <text x="22" y="34" fill="#e5e7eb" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">git commit --craft</text>
  </g>
</svg>
