<svg width="760" height="300" viewBox="0 0 760 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated coding beagle companion</title>
  <desc id="desc">An original black and white beagle-inspired coding companion with a wagging tail, blinking eyes, floating code bubbles, and a warm desk scene.</desc>
  <defs>
    <linearGradient id="desk" x1="70" y1="206" x2="690" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <linearGradient id="screen" x1="280" y1="68" x2="602" y2="205" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="15" flood-color="#0f172a" flood-opacity=".16"/>
    </filter>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes tailWag {
        0%, 100% { transform: rotate(-10deg); }
        50% { transform: rotate(16deg); }
      }
      @keyframes earBounce {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(5px) rotate(3deg); }
      }
      @keyframes blink {
        0%, 88%, 100% { transform: scaleY(1); }
        92%, 96% { transform: scaleY(.12); }
      }
      @keyframes pawTap {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(5px); }
      }
      @keyframes cursor {
        0%, 45% { opacity: 1; }
        46%, 100% { opacity: .15; }
      }
      @keyframes floatUp {
        0%, 100% { transform: translateY(0); opacity: .75; }
        50% { transform: translateY(-10px); opacity: 1; }
      }
      @keyframes screenPulse {
        0%, 100% { opacity: .72; }
        50% { opacity: 1; }
      }
      .tail { transform-box: fill-box; transform-origin: 12px 72px; animation: tailWag 1.2s ease-in-out infinite; }
      .ear { transform-box: fill-box; transform-origin: 20px 18px; animation: earBounce 2.6s ease-in-out infinite; }
      .eye { transform-box: fill-box; transform-origin: center; animation: blink 4s ease-in-out infinite; }
      .paw { animation: pawTap .9s ease-in-out infinite; }
      .cursor { animation: cursor 1s steps(1) infinite; }
      .bubble-a { animation: floatUp 4.2s ease-in-out infinite; }
      .bubble-b { animation: floatUp 5s ease-in-out infinite .5s; }
      .bubble-c { animation: floatUp 4.6s ease-in-out infinite 1s; }
      .screen-line { animation: screenPulse 3s ease-in-out infinite; }
      @media (prefers-reduced-motion: reduce) {
        .tail, .ear, .eye, .paw, .cursor, .bubble-a, .bubble-b, .bubble-c, .screen-line { animation: none; }
      }
    </style>
  </defs>

  <rect x="28" y="24" width="704" height="252" rx="28" fill="#f8fafc"/>
  <path d="M96 220 C160 186 224 245 292 213 C360 181 414 225 496 194 C596 156 648 192 708 165 V276 H96 V220Z" fill="#38bdf8" fill-opacity=".08"/>
  <rect x="82" y="204" width="596" height="44" rx="22" fill="url(#desk)"/>
  <path d="M112 247 H650" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>

  <g class="bubble-a" filter="url(#glow)">
    <rect x="96" y="62" width="92" height="34" rx="17" fill="#e0f2fe"/>
    <text x="118" y="84" fill="#0369a1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" font-weight="700">&lt;/&gt;</text>
  </g>
  <g class="bubble-b" filter="url(#glow)">
    <rect x="578" y="42" width="92" height="34" rx="17" fill="#dcfce7"/>
    <text x="602" y="64" fill="#15803d" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" font-weight="700">git</text>
  </g>
  <g class="bubble-c" filter="url(#glow)">
    <rect x="604" y="100" width="70" height="34" rx="17" fill="#ffedd5"/>
    <text x="625" y="122" fill="#c2410c" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" font-weight="700">run</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="268" y="72" width="330" height="148" rx="18" fill="url(#screen)"/>
    <rect x="292" y="96" width="96" height="10" rx="5" fill="#38bdf8" fill-opacity=".95"/>
    <rect class="screen-line" x="292" y="124" width="232" height="9" rx="4.5" fill="#a7f3d0"/>
    <rect class="screen-line" x="292" y="148" width="184" height="9" rx="4.5" fill="#facc15" opacity=".9"/>
    <rect class="screen-line" x="292" y="172" width="248" height="9" rx="4.5" fill="#93c5fd" opacity=".9"/>
    <rect class="cursor" x="548" y="169" width="10" height="16" rx="2" fill="#f8fafc"/>
    <rect x="392" y="220" width="84" height="18" rx="8" fill="#cbd5e1"/>
    <rect x="344" y="238" width="180" height="14" rx="7" fill="#e2e8f0"/>
  </g>

  <g transform="translate(146 112)">
    <path class="tail" d="M32 82 C4 70 -7 46 8 31 C24 16 48 35 40 58" stroke="#111827" stroke-width="16" stroke-linecap="round"/>
    <ellipse cx="88" cy="100" rx="58" ry="46" fill="#ffffff" stroke="#111827" stroke-width="6"/>
    <path d="M55 74 C67 55 107 54 125 74 C108 67 78 67 55 74Z" fill="#111827"/>
    <ellipse cx="128" cy="67" rx="43" ry="38" fill="#ffffff" stroke="#111827" stroke-width="6"/>
    <path class="ear" d="M100 56 C88 75 88 105 108 118 C127 130 148 101 140 76 C135 58 117 49 100 56Z" fill="#111827"/>
    <path d="M146 78 C165 78 180 86 185 98 C173 107 154 104 143 94" fill="#ffffff" stroke="#111827" stroke-width="6" stroke-linejoin="round"/>
    <circle class="eye" cx="135" cy="62" r="5.5" fill="#111827"/>
    <circle cx="170" cy="92" r="6" fill="#111827"/>
    <path d="M170 102 C166 111 154 113 148 106" stroke="#111827" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="72" cy="142" rx="20" ry="12" fill="#111827"/>
    <ellipse cx="126" cy="142" rx="20" ry="12" fill="#111827"/>
    <path class="paw" d="M142 122 C158 126 169 134 174 148" stroke="#111827" stroke-width="11" stroke-linecap="round"/>
    <path class="paw" d="M104 124 C120 128 131 136 136 150" stroke="#111827" stroke-width="11" stroke-linecap="round"/>
  </g>

  <g transform="translate(74 218)">
    <rect x="0" y="0" width="154" height="34" rx="17" fill="#ffffff" stroke="#cbd5e1"/>
    <circle cx="23" cy="17" r="6" fill="#22c55e"/>
    <text x="42" y="22" fill="#334155" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="700">build buddy</text>
  </g>
</svg>
